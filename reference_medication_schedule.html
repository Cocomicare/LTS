<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medication Schedule</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');
:root { --bg:#F0F4F8; --surface:#FFFFFF; --border:#D0DCE8; --ink:#1A2533; --ink2:#4A5E72; --ink3:#8A9EAF; --accent:#3B82C4; --warn:#E07B39; --warn-bg:#FDF0E8; --danger:#C94040; --danger-bg:#FAEAEA; --good:#2D9E6B; --good-bg:#E8F7F1; --radius:12px; }
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--ink); min-height:100vh; font-size:15px; }
header { background:var(--surface); border-bottom:1px solid var(--border); padding:18px 20px; }
.logo-title { font-family:'DM Serif Display',serif; font-size:19px; }
.logo-sub { font-size:11px; color:var(--ink3); text-transform:uppercase; letter-spacing:.5px; }
.page { padding:20px 16px 50px; max-width:640px; margin:0 auto; }
.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px 22px; margin-bottom:16px; }
.card h2 { font-family:'DM Serif Display',serif; font-size:17px; margin-bottom:10px; }
.card h3 { font-size:13px; font-weight:700; margin:12px 0 5px; }
.card p { line-height:1.6; margin-bottom:8px; color:var(--ink2); }
.card ul { margin:6px 0 6px 20px; line-height:1.7; color:var(--ink2); }
.card li { margin-bottom:4px; }
.note-box { background:#EEF3FA; border-radius:8px; padding:11px 14px; margin-bottom:14px; font-size:12.5px; color:var(--ink2); line-height:1.5; }
.med-row { border-left:4px solid var(--accent); padding:12px 14px; margin-bottom:10px; background:var(--bg); border-radius:8px; }
.med-row.lifelong { border-left-color:#7B5EA7; }
.med-name { font-weight:700; font-size:14px; }
.med-strength { font-size:12px; color:var(--ink3); margin-bottom:4px; }
.med-purpose { font-size:13px; color:var(--ink2); margin-bottom:6px; }
.med-timing { font-size:12px; color:var(--accent); font-weight:600; margin-bottom:4px; }
.med-pearls { font-size:12px; color:#9a5a1f; background:var(--warn-bg); border-radius:6px; padding:6px 9px; margin-top:6px; }
.danger-box { background:var(--danger-bg); border:1px solid #f0c0c0; border-radius:8px; padding:12px 14px; margin:10px 0; color:var(--danger); line-height:1.6; }
.danger-box strong { display:block; margin-bottom:4px; }
.contact-row { display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px solid var(--border); font-size:14px; }
.contact-row:last-child { border-bottom:none; }
.contact-label { color:var(--ink3); }
.contact-val { font-weight:600; text-align:right; }
.empty { text-align:center; padding:60px 20px; color:var(--ink3); }
.source-note { font-size:11px; color:var(--ink3); text-align:center; margin-top:20px; }
</style>
</head>
<body>
<header>
  <a href="reference_hub.html" style="display:inline-block;font-size:13px;color:#3B82C4;text-decoration:none;font-weight:600;margin-bottom:6px">← Reference Guide</a><br>
  <div class="logo-title">Medication Schedule</div>
  <div class="logo-sub">Post-Transplant Reference Guide</div>
</header>
<div class="page" id="content"></div>

<script>
(async function init() {
  const user = await getCurrentUser();
  if (!user) {
    document.getElementById('content').innerHTML = '<div class="empty">🔒 Please log in via the PLTS Care dashboard to view this guide.</div>';
    return;
  }
  document.getElementById('content').innerHTML = `
    <div class="note-box">📋 This page reflects UF Health's official "Solid Organ Transplant Program — Medication Instructions" sheet. <strong>Doses shown below are blank by design</strong> — your actual MG amounts and timing are written on your personal filled-in copy. Bring that physical sheet to the hospital and every clinic visit.</div>

    <div class="card">
      <h2>💊 Scheduled Medications</h2>
      <p style="font-size:12px;color:var(--danger);font-weight:600">⚠️ Allergy on file: Ketorolac (due to lung transplant)</p>

      <div class="med-row lifelong">
        <div class="med-name">Tacrolimus (Prograf)</div>
        <div class="med-strength">Capsule — lifelong medication</div>
        <div class="med-purpose">Prevents rejection</div>
        <div class="med-timing">8 AM (breakfast) · 8 PM (evening)</div>
        <div class="med-pearls">Do NOT take the morning dose on lab/clinic visit days until AFTER labs are drawn · Dose is based on blood levels</div>
      </div>

      <div class="med-row lifelong">
        <div class="med-name">Mycophenolate (CellCept)</div>
        <div class="med-strength">250 MG Capsule — lifelong medication</div>
        <div class="med-purpose">Prevents rejection</div>
        <div class="med-timing">8 AM (breakfast) · 8 PM (evening)</div>
      </div>

      <div class="med-row lifelong">
        <div class="med-name">Prednisone</div>
        <div class="med-strength">10 MG Tablet — lifelong medication</div>
        <div class="med-purpose">Prevents rejection</div>
        <div class="med-timing">8 AM (breakfast)</div>
        <div class="med-pearls">Take with food · Dose decreases over time</div>
      </div>

      <div class="med-row">
        <div class="med-name">Valganciclovir (Valcyte)</div>
        <div class="med-strength">450 MG Tablet</div>
        <div class="med-purpose">Prevents viral infections (CMV and herpes simplex virus)</div>
        <div class="med-timing">8 AM (breakfast)</div>
        <div class="med-pearls">STOP when advised — usual duration 6–12 months</div>
      </div>

      <div class="med-row">
        <div class="med-name">Bactrim (SMZ-TMP)</div>
        <div class="med-strength">800-160 MG Tablet — lifelong medication</div>
        <div class="med-purpose">Prevents bacterial infection (Pneumocystis pneumonia / PJP)</div>
        <div class="med-timing">1 tablet, three times weekly — Mondays, Wednesdays & Fridays</div>
        <div class="med-pearls">Can increase skin sensitivity to sunlight — apply SPF 30 sunscreen</div>
      </div>

      <div class="med-row">
        <div class="med-name">Antifungal (Tablet/Capsule)</div>
        <div class="med-strength">Specific agent recorded on your personal sheet</div>
        <div class="med-purpose">Prevents fungal infection</div>
        <div class="med-timing">8 AM (breakfast) · 5 PM (dinner)</div>
        <div class="med-pearls">Take with food · STOP when advised — usual duration 6 months</div>
      </div>

      <div class="med-row">
        <div class="med-name">Pantoprazole (Protonix)</div>
        <div class="med-strength">40 MG Tablet</div>
        <div class="med-purpose">Acid reflux & stomach ulcer prevention</div>
        <div class="med-timing">8 AM (breakfast)</div>
      </div>

      <div class="med-row">
        <div class="med-name">Calcium Carbonate + Vitamin D3</div>
        <div class="med-strength">Tablet</div>
        <div class="med-purpose">Calcium and Vitamin D supplement</div>
        <div class="med-timing">8 AM (breakfast)</div>
        <div class="med-pearls">Improves bone health</div>
      </div>

      <div class="med-row">
        <div class="med-name">Multivitamin</div>
        <div class="med-strength">Tablet</div>
        <div class="med-purpose">Vitamin supplement</div>
        <div class="med-timing">8 AM (breakfast)</div>
      </div>

      <div class="med-row">
        <div class="med-name">Magnesium</div>
        <div class="med-strength">Tablet</div>
        <div class="med-purpose">Magnesium supplement</div>
        <div class="med-timing">8 AM (breakfast)</div>
        <div class="med-pearls">Helps keep magnesium levels normal</div>
      </div>
    </div>

    <div class="card">
      <h2>🩹 As-Needed Medications</h2>

      <div class="med-row">
        <div class="med-name">Acetaminophen (Tylenol)</div>
        <div class="med-strength">325 MG Tablet — over the counter</div>
        <div class="med-purpose">Pain control / headache</div>
        <div class="med-timing">1–2 tablets by mouth every 6 hours AS NEEDED</div>
        <div class="med-pearls">Do NOT take more than 4000 mg (4 g) in 24 hours</div>
      </div>

      <div class="med-row">
        <div class="med-name">Docusate (Colace)</div>
        <div class="med-strength">100 MG gel capsule — stool softener, over the counter</div>
        <div class="med-purpose">Prevents/treats constipation</div>
        <div class="med-timing">100 mg (1 capsule) up to twice daily AS NEEDED</div>
        <div class="med-pearls">Do not take if experiencing loose stools</div>
      </div>

      <div class="med-row">
        <div class="med-name">Senna (Senokot)</div>
        <div class="med-strength">8.6 MG Tablet — stimulates bowel muscles, over the counter</div>
        <div class="med-purpose">Prevents/treats constipation</div>
        <div class="med-timing">1 tablet up to twice daily AS NEEDED</div>
        <div class="med-pearls">Do not take if experiencing loose stools</div>
      </div>

      <div class="med-row">
        <div class="med-name">Polyethylene Glycol Powder (Miralax)</div>
        <div class="med-strength">Brings water into bowel — over the counter</div>
        <div class="med-purpose">Prevents/treats constipation</div>
        <div class="med-timing">Mix 17g (1 cap full) with 8oz water/juice, up to twice daily AS NEEDED</div>
        <div class="med-pearls">Do not take if experiencing loose stools</div>
      </div>
    </div>

    <div class="card">
      <h2>⚠️ Medication Safety Rules</h2>
      <ul>
        <li>If any doctor outside the transplant team wants to prescribe new medicine, call the transplant team first to verify it's safe</li>
        <li>Call the transplant team before starting any new OTC medicine, including vitamins or supplements</li>
        <li>Avoid herbal supplements — interactions with transplant medications aren't well known</li>
        <li><strong>No NSAIDs</strong> (ibuprofen, Motrin, Advil, naproxen, Aleve) — these can harm the kidney. Tylenol is the only safe OTC pain medicine.</li>
        <li>Do NOT run out of medication — call your pharmacy at least <strong>7–10 days before</strong> you run out. If you can't get a refill on time, contact your coordinator.</li>
      </ul>
    </div>

    <div class="danger-box">
      <strong>📞 Symptoms to Report</strong>
      Fever of 100°F or more · Chills · Night sweats · Chest pain · Difficulty breathing · Hard to breathe when lying flat · Swelling in hands/feet/abdomen · Weight gain of 2+ lbs in one day or 4+ lbs in a week · Heart rate above 120 or below 70 · Systolic BP above 150 or below 90 · Palpitations · Flu-type aches/pains · Nausea or vomiting (2+ times in a day) · Diarrhea (4+ episodes in a day) · New-onset headaches or double vision
    </div>

    <div class="card">
      <h2>📞 Lung Transplant Program Contact</h2>
      <div class="contact-row"><span class="contact-label">Office Hours</span><span class="contact-val">Mon–Fri, 8:00 AM–4:30 PM</span></div>
      <div class="contact-row"><span class="contact-label">Phone</span><span class="contact-val">352-265-8940</span></div>
      <div class="contact-row"><span class="contact-label">Emergency / After-Hours</span><span class="contact-val">Same number — ask operator for the Adult Post Lung Transplant Coordinator On-Call</span></div>
    </div>

    <div class="source-note">Source: UF Health Solid Organ Transplant Program — Medication Instructions sheet</div>
  `;
})();
</script>
</body>
</html>
