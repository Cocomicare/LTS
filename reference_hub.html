<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post-Transplant Reference Guide</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');
:root { --bg:#F0F4F8; --surface:#FFFFFF; --border:#D0DCE8; --ink:#1A2533; --ink2:#4A5E72; --ink3:#8A9EAF; --teal:#0D5C6B; --radius:12px; }
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--ink); min-height:100vh; font-size:15px; }
header { background:var(--surface); border-bottom:1px solid var(--border); padding:18px 20px; }
.logo-title { font-family:'DM Serif Display',serif; font-size:19px; }
.logo-sub { font-size:11px; color:var(--ink3); text-transform:uppercase; letter-spacing:.5px; }
.page { padding:20px 16px 50px; max-width:640px; margin:0 auto; }
.intro { font-size:13px; color:var(--ink3); margin-bottom:16px; line-height:1.5; }
.search-box { width:100%; padding:12px 14px; border:1.5px solid var(--border); border-radius:10px; font-size:15px; margin-bottom:16px; background:var(--surface); font-family:'DM Sans',sans-serif; }
.search-box:focus { outline:none; border-color:var(--teal); }
.search-status { font-size:12px; color:var(--ink3); margin:-10px 0 12px 2px; }
.result-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px; margin-bottom:8px; cursor:pointer; transition:all .15s; }
.result-card:hover { border-color:var(--teal); box-shadow:0 4px 16px rgba(13,92,107,.08); }
.result-top { display:flex; align-items:center; gap:8px; margin-bottom:5px; }
.result-icon { font-size:16px; }
.result-name { font-size:13.5px; font-weight:600; color:var(--ink); }
.result-snippet { font-size:12.5px; color:var(--ink2); line-height:1.5; }
.result-snippet mark { background:#FDE89A; color:var(--ink); padding:0 2px; border-radius:2px; }
.ref-tile { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; cursor:pointer; transition:all 0.15s; display:flex; align-items:center; gap:12px; margin-bottom:8px; -webkit-tap-highlight-color:transparent; }
.ref-tile:hover { border-color:var(--teal); box-shadow:0 4px 16px rgba(13,92,107,.08); }
.ref-tile-icon { font-size:22px; flex-shrink:0; }
.ref-tile-name { font-size:14px; font-weight:600; color:var(--ink); }
.ref-tile-desc { font-size:12px; color:var(--ink3); margin-top:2px; }
.ref-tile-chevron { color:var(--ink3); font-size:16px; margin-left:auto; flex-shrink:0; }
.empty { text-align:center; padding:60px 20px; color:var(--ink3); }
</style>
</head>
<body>
<header>
  <div class="logo-title">Post-Transplant Reference Guide</div>
  <div class="logo-sub">Education & Reference</div>
</header>
<div class="page">
  <input type="text" class="search-box" id="search" placeholder="🔍 Search the guide (e.g. a medication, 'sunscreen', 'bronchoscopy')…" oninput="onSearchInput()">
  <div class="search-status" id="search-status"></div>
  <div class="intro" id="intro">Information from your UF Health Shands transplant team. Tap a topic to read.</div>
  <div id="content"></div>
</div>

<script>
const ITEMS = [
  { name:'Immunosuppression Balance', icon:'💊', desc:'Interactive dial: infection risk vs. rejection risk', file:'Immuno_Suppression_Dial.html' },
  { name:'General Discharge Instructions', icon:'📓', desc:'Daily monitoring, precautions, when to call', file:'reference_discharge_instructions.html' },
  { name:'Medications Guide', icon:'💉', desc:'Full drug list, purpose & side effects', file:'reference_medications.html' },
  { name:'Safe Over-the-Counter Medications', icon:'🧴', desc:'Searchable: safe vs. avoid by symptom', file:'reference_otc_medications.html' },
  { name:'Nutrition & Healthy Eating', icon:'🥗', desc:'Guidelines, easy health tips, cholesterol', file:'reference_nutrition.html' },
  { name:'Diabetes Management', icon:'🩸', desc:'Risk factors, hypo/hyperglycemia, injections', file:'reference_diabetes.html' },
  { name:'Exercise Guidelines', icon:'🏋️', desc:'Lifting limits, rehab, walking expectations', file:'reference_exercise.html' },
  { name:'Returning to Normal Life', icon:'🏡', desc:"Do's and Don'ts after transplant", file:'reference_normal_life.html' },
  { name:'Bronchoscopy & Clinic Visits', icon:'🔬', desc:'What to expect, prep instructions', file:'reference_bronchoscopy.html' },
  { name:'Bone, Dental & Skin Health', icon:'☀️', desc:'Screening schedules, sun protection', file:'reference_bone_skin_health.html' },
  { name:'Immunizations', icon:'💉', desc:'Live vaccine restrictions & guidance', file:'reference_immunizations.html' },
  { name:'Writing to Your Donor Family', icon:'💌', desc:'Full LifeQuest guidance: what to include, off-limits info, mailing, hearing back', file:'reference_donor_family.html' },
  { name:'Outpatient Follow-Up Schedule', icon:'📅', desc:'Clinic days, CXR, PFTs, labs, PT, med refills', file:'reference_followup_schedule.html' },
  { name:'Medication Schedule', icon:'💊', desc:'Official dosing template, as-needed meds, symptoms to report', file:'reference_medication_schedule.html' },
  { name:'Communication & Care Partnership', icon:'🤝', desc:'How & when to contact your team — emergent vs. urgent vs. routine', file:'reference_communication_agreement.html' },
  { name:'Care Roadmap', icon:'🧭', desc:'Phases of care, team structure, your role in the journey', file:'reference_care_roadmap.html' },
  { name:'Discharge Items Checklist', icon:'🛒', desc:'Home monitoring equipment to buy: BP machine, FEV1 meter, masks', file:'reference_discharge_items.html' },
  { name:'Post-Discharge FAQ', icon:'❓', desc:'Showering, driving, chest tube care, expected symptoms', file:'reference_postdischarge_faq.html' },
  { name:'UF Health Facility Directory', icon:'📍', desc:'Names & addresses of UF Health locations across Gainesville', file:'reference_facility_directory.html' },
];

let pageTextCache = null; // populated lazily: [{...item, text}]
let isLoggedIn = false;

(async function init() {
  const user = await getCurrentUser();
  const content = document.getElementById('content');
  if (!user) {
    content.innerHTML = '<div class="empty">🔒 Please log in via the LTS Care dashboard to view this guide.</div>';
    document.getElementById('search').style.display = 'none';
    return;
  }
  isLoggedIn = true;
  renderDefaultList();
})();

function renderDefaultList() {
  document.getElementById('intro').style.display = '';
  document.getElementById('search-status').textContent = '';
  document.getElementById('content').innerHTML = ITEMS.map(item => `
    <div class="ref-tile" onclick="window.location.href='${item.file}'">
      <span class="ref-tile-icon">${item.icon}</span>
      <div>
        <div class="ref-tile-name">${item.name}</div>
        <div class="ref-tile-desc">${item.desc}</div>
      </div>
      <span class="ref-tile-chevron">→</span>
    </div>`).join('');
}

// Fetch + strip HTML tags from every reference page once, cache the plain text for searching.
async function ensurePageTextLoaded() {
  if (pageTextCache) return pageTextCache;
  document.getElementById('search-status').textContent = 'Indexing guide…';
  const results = await Promise.all(ITEMS.map(async item => {
    try {
      const res = await fetch(item.file);
      const html = await res.text();
      const doc = new DOMParser().parseFromString(html, 'text/html');
      const text = (doc.body.innerText || doc.body.textContent || '').replace(/\s+/g, ' ').trim();
      return { ...item, text };
    } catch (e) {
      return { ...item, text: '' };
    }
  }));
  pageTextCache = results;
  return results;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function buildSnippet(text, query) {
  const idx = text.toLowerCase().indexOf(query.toLowerCase());
  if (idx === -1) return '';
  const start = Math.max(0, idx - 60);
  const end = Math.min(text.length, idx + query.length + 80);
  let snippet = text.slice(start, end);
  if (start > 0) snippet = '…' + snippet;
  if (end < text.length) snippet = snippet + '…';
  const re = new RegExp(query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'ig');
  return escapeHtml(snippet).replace(re, m => `<mark>${m}</mark>`);
}

let searchDebounce = null;
function onSearchInput() {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(runSearch, 150);
}

async function runSearch() {
  if (!isLoggedIn) return;
  const q = document.getElementById('search').value.trim();
  if (!q) { renderDefaultList(); return; }

  document.getElementById('intro').style.display = 'none';
  const pages = await ensurePageTextLoaded();

  const matches = pages.filter(p => p.text.toLowerCase().includes(q.toLowerCase()));
  const statusEl = document.getElementById('search-status');
  const contentEl = document.getElementById('content');

  if (!matches.length) {
    statusEl.textContent = `No results for "${q}"`;
    contentEl.innerHTML = '';
    return;
  }

  statusEl.textContent = `${matches.length} section${matches.length>1?'s':''} match "${q}"`;
  contentEl.innerHTML = matches.map(m => `
    <div class="result-card" onclick="window.location.href='${m.file}'">
      <div class="result-top"><span class="result-icon">${m.icon}</span><span class="result-name">${m.name}</span></div>
      <div class="result-snippet">${buildSnippet(m.text, q)}</div>
    </div>`).join('');
}
</script>
</body>
</html>
