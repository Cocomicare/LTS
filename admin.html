<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLTS Care — Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');
:root {
  --bg:#F0F4F8; --surface:#FFFFFF; --border:#D0DCE8; --ink:#1A2533;
  --ink2:#4A5E72; --ink3:#8A9EAF; --teal:#0D5C6B; --teal-bg:#E5F0F2;
  --danger:#C94040; --danger-bg:#FAEAEA; --good:#2D9E6B; --good-bg:#E8F7F1;
  --warn:#E07B39; --warn-bg:#FDF5EE; --radius:12px;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--ink); min-height:100vh; }
header { background:var(--teal); color:#fff; padding:16px 20px; position:sticky; top:0; z-index:50; display:flex; align-items:center; justify-content:space-between; }
.header-title { font-family:'DM Serif Display',serif; font-size:17px; }
.header-sub { font-size:11px; opacity:.75; text-transform:uppercase; letter-spacing:.5px; }
.header-back { color:rgba(255,255,255,.8); font-size:13px; text-decoration:none; font-weight:600; }
.tabs { display:flex; background:var(--surface); border-bottom:1px solid var(--border); }
.tab { flex:1; padding:12px; text-align:center; font-size:13px; font-weight:600; color:var(--ink3); cursor:pointer; border-bottom:2px solid transparent; transition:all .15s; }
.tab.active { color:var(--teal); border-bottom-color:var(--teal); }
.page { display:none; padding:20px 16px 60px; max-width:720px; margin:0 auto; }
.page.active { display:block; }
.stat-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:20px; }
.stat-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px; text-align:center; }
.stat-val { font-family:'DM Serif Display',serif; font-size:26px; color:var(--teal); }
.stat-label { font-size:11px; color:var(--ink3); text-transform:uppercase; letter-spacing:.4px; margin-top:2px; }
.section-label { font-size:11px; font-weight:700; color:var(--ink3); text-transform:uppercase; letter-spacing:.5px; margin-bottom:10px; }
.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:10px; overflow:hidden; }
.card-row { display:flex; align-items:center; gap:12px; padding:13px 14px; border-bottom:1px solid var(--border); }
.card-row:last-child { border-bottom:none; }
.card-avatar { width:32px; height:32px; border-radius:50%; background:var(--teal-bg); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; color:var(--teal); flex-shrink:0; }
.card-main { flex:1; min-width:0; }
.card-name { font-size:13.5px; font-weight:600; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.card-sub { font-size:11.5px; color:var(--ink3); margin-top:1px; }
.badge { font-size:10.5px; font-weight:600; padding:2px 8px; border-radius:20px; white-space:nowrap; flex-shrink:0; }
.badge-used { background:var(--good-bg); color:var(--good); }
.badge-unused { background:var(--warn-bg); color:var(--warn); }
.badge-admin { background:var(--teal-bg); color:var(--teal); }
.btn { display:inline-flex; align-items:center; gap:6px; padding:8px 14px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; border:none; font-family:'DM Sans',sans-serif; transition:all .15s; }
.btn-primary { background:var(--teal); color:#fff; }
.btn-ghost { background:none; border:1.5px solid var(--border); color:var(--ink2); }
.btn-danger { background:none; border:1.5px solid #f0c0c0; color:var(--danger); }
.btn:disabled { opacity:.5; cursor:not-allowed; }
.btn-sm { padding:5px 10px; font-size:12px; }
.toolbar { display:flex; gap:8px; margin-bottom:16px; align-items:center; flex-wrap:wrap; }
.invite-form { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:16px; display:none; }
.invite-form.open { display:block; }
.invite-form-title { font-family:'DM Serif Display',serif; font-size:15px; margin-bottom:12px; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }
.form-group { display:flex; flex-direction:column; gap:5px; }
label { font-size:11px; font-weight:600; color:var(--ink3); text-transform:uppercase; letter-spacing:.05em; }
input[type=text], input[type=email] { padding:9px 12px; border:1.5px solid var(--border); border-radius:8px; font-family:'DM Sans',sans-serif; font-size:14px; color:var(--ink); background:var(--bg); width:100%; outline:none; }
input:focus { border-color:var(--teal); }
.form-actions { display:flex; gap:8px; justify-content:flex-end; }
.invite-link-box { background:var(--bg); border:1.5px solid var(--border); border-radius:8px; padding:10px 12px; font-size:12px; font-family:monospace; color:var(--ink2); word-break:break-all; }
.copy-row { display:flex; gap:8px; align-items:center; margin-top:8px; }
.empty { text-align:center; padding:40px 20px; color:var(--ink3); }
.access-denied { text-align:center; padding:80px 20px; color:var(--ink3); }
.access-denied .icon { font-size:40px; margin-bottom:12px; }
.toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; padding:10px 18px; border-radius:30px; font-size:13px; z-index:999; opacity:0; transition:opacity .25s; pointer-events:none; white-space:nowrap; }
.toast.show { opacity:1; }
.toast.success { background:var(--good); }
.toast.error { background:var(--danger); }
@media(max-width:500px) { .form-row { grid-template-columns:1fr; } .stat-val { font-size:20px; } }
</style>
</head>
<body>

<header>
  <div>
    <div class="header-title">PLTS Care Admin</div>
    <div class="header-sub">User & Invitation Management</div>
  </div>
  <a href="index.html" class="header-back">← Dashboard</a>
</header>

<div id="access-denied-screen" style="display:none">
  <div class="access-denied">
    <div class="icon">🔒</div>
    <div style="font-family:'DM Serif Display',serif;font-size:17px;color:var(--ink);margin-bottom:6px">Access Denied</div>
    <div>This page is only accessible to admin accounts.</div>
  </div>
</div>

<div id="admin-content" style="display:none">
  <div class="tabs">
    <div class="tab active" id="tab-users" onclick="showTab('users')">👥 Users</div>
    <div class="tab" id="tab-invites" onclick="showTab('invites')">🔗 Invitations</div>
  </div>

  <!-- USERS TAB -->
  <div class="page active" id="page-users">
    <div class="stat-row" id="user-stats"></div>
    <div class="section-label">All Accounts</div>
    <div id="users-list"></div>
  </div>

  <!-- INVITES TAB -->
  <div class="page" id="page-invites">
    <div class="stat-row" id="invite-stats"></div>

    <div class="toolbar">
      <button class="btn btn-primary" onclick="toggleInviteForm()">+ New Invite</button>
    </div>

    <div class="invite-form" id="invite-form">
      <div class="invite-form-title">Create Invitation</div>
      <div class="form-row">
        <div class="form-group">
          <label>Name / Label</label>
          <input type="text" id="inv-label" placeholder="e.g. Natasha, Dr. Ashley">
        </div>
        <div class="form-group">
          <label>Email hint (optional)</label>
          <input type="email" id="inv-email" placeholder="their@email.com">
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-ghost" onclick="toggleInviteForm()">Cancel</button>
        <button class="btn btn-primary" onclick="createInvite()">Generate Invite Link</button>
      </div>
    </div>

    <div id="generated-invite" style="display:none" class="card" style="padding:16px;margin-bottom:16px">
      <div style="padding:14px">
        <div style="font-size:13px;font-weight:600;color:var(--ink);margin-bottom:8px">✅ Invite Created</div>
        <div class="invite-link-box" id="generated-link"></div>
        <div class="copy-row">
          <button class="btn btn-primary btn-sm" onclick="copyGeneratedLink()">📋 Copy Link</button>
          <span style="font-size:12px;color:var(--ink3)" id="copy-confirm"></span>
        </div>
      </div>
    </div>

    <div class="section-label">All Invitations</div>
    <div id="invites-list"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let currentUser = null;
let allProfiles = [];
let allInvites = [];

(async function init() {
  currentUser = await getCurrentUser();
  if (!currentUser) { window.location.href = 'index.html'; return; }

  // Check admin status
  const { data: profile } = await sb.from('profiles').select('is_admin').eq('id', currentUser.id).single();
  if (!profile?.is_admin) {
    document.getElementById('access-denied-screen').style.display = 'block';
    return;
  }

  document.getElementById('admin-content').style.display = 'block';
  await Promise.all([loadUsers(), loadInvites()]);
})();

// ── TAB SWITCHING ───────────────────────────────
function showTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.getElementById('page-' + name).classList.add('active');
}

// ── USERS ───────────────────────────────────────
async function loadUsers() {
  const { data, error } = await sb.from('profiles').select('*').order('created_at', { ascending: true });
  if (error) { showToast('Failed to load users: ' + error.message, 'error'); return; }
  allProfiles = data || [];
  renderUsers();
}

function renderUsers() {
  const total = allProfiles.length;
  const admins = allProfiles.filter(p => p.is_admin).length;
  document.getElementById('user-stats').innerHTML = `
    <div class="stat-card"><div class="stat-val">${total}</div><div class="stat-label">Total Users</div></div>
    <div class="stat-card"><div class="stat-val">${admins}</div><div class="stat-label">Admins</div></div>
    <div class="stat-card"><div class="stat-val">${total - admins}</div><div class="stat-label">Regular Users</div></div>`;

  if (!allProfiles.length) {
    document.getElementById('users-list').innerHTML = '<div class="empty">No users yet.</div>';
    return;
  }

  document.getElementById('users-list').innerHTML = '<div class="card">' +
    allProfiles.map(p => {
      const initials = (p.full_name || p.email || '?').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
      const joined = p.created_at ? fmtEasternDate(p.created_at) : '—';
      const transplant = p.transplant_type ? `${p.transplant_type}${p.transplant_date ? ' · ' + fmtEasternDate(p.transplant_date) : ''}` : '';
      return `<div class="card-row">
        <div class="card-avatar">${initials}</div>
        <div class="card-main">
          <div class="card-name">${escHtml(p.full_name || '(no name)')} ${p.is_admin ? '<span class="badge badge-admin">Admin</span>' : ''}</div>
          <div class="card-sub">${escHtml(p.email || '—')} · Joined ${joined}${transplant ? ' · ' + escHtml(transplant) : ''}</div>
        </div>
      </div>`;
    }).join('') + '</div>';
}

// ── INVITATIONS ─────────────────────────────────
async function loadInvites() {
  const { data, error } = await sb.from('invitations').select('*').order('created_at', { ascending: false });
  if (error) { showToast('Failed to load invitations: ' + error.message, 'error'); return; }
  allInvites = data || [];
  renderInvites();
}

function renderInvites() {
  const total = allInvites.length;
  const used = allInvites.filter(i => i.used_at).length;
  const unused = total - used;
  document.getElementById('invite-stats').innerHTML = `
    <div class="stat-card"><div class="stat-val">${total}</div><div class="stat-label">Total</div></div>
    <div class="stat-card"><div class="stat-val">${used}</div><div class="stat-label">Used</div></div>
    <div class="stat-card"><div class="stat-val">${unused}</div><div class="stat-label">Available</div></div>`;

  if (!allInvites.length) {
    document.getElementById('invites-list').innerHTML = '<div class="empty">No invitations yet. Create one above.</div>';
    return;
  }

  document.getElementById('invites-list').innerHTML = '<div class="card">' +
    allInvites.map(inv => {
      const link = `${window.location.origin}/LTS/?invite=${inv.code}`;
      const used = !!inv.used_at;
      const usedBy = inv.used_by_name ? `${inv.used_by_name}${inv.used_by_email ? ' · ' + inv.used_by_email : ''} · ${fmtEasternDate(inv.used_at)}` : '';
      return `<div class="card-row" id="inv-${inv.id}">
        <div class="card-main">
          <div class="card-name">${escHtml(inv.label || '(unlabeled)')} &nbsp;<span class="badge ${used ? 'badge-used' : 'badge-unused'}">${used ? 'Used' : 'Available'}</span></div>
          <div class="card-sub">
            ${inv.email_hint ? escHtml(inv.email_hint) + ' · ' : ''}
            Code: <code>${inv.code}</code> · Created ${fmtEasternDate(inv.created_at)}
            ${usedBy ? '<br>Used by: ' + escHtml(usedBy) : ''}
          </div>
        </div>
        <div style="display:flex;gap:6px;flex-shrink:0">
          ${!used ? `<button class="btn btn-ghost btn-sm" onclick="copyInviteLink('${link}', this)">📋</button>
          <button class="btn btn-danger btn-sm" onclick="revokeInvite('${inv.id}')">✕</button>` : ''}
        </div>
      </div>`;
    }).join('') + '</div>';
}

function toggleInviteForm() {
  const form = document.getElementById('invite-form');
  const isOpen = form.classList.contains('open');
  form.classList.toggle('open', !isOpen);
  document.getElementById('generated-invite').style.display = 'none';
  if (!isOpen) { document.getElementById('inv-label').focus(); }
}

function generateCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({ length: 8 }, () => chars[Math.floor(Math.random() * chars.length)]).join('');
}

async function createInvite() {
  const label = document.getElementById('inv-label').value.trim();
  const emailHint = document.getElementById('inv-email').value.trim();
  if (!label) { showToast('Please enter a name/label for this invite', 'error'); return; }

  const code = generateCode();
  try {
    const inserted = await insertRow('invitations', {
      code, label, email_hint: emailHint || null, created_by: currentUser.id
    });
    allInvites.unshift(inserted);

    const link = `${window.location.origin}/LTS/?invite=${code}`;
    document.getElementById('generated-link').textContent = link;
    document.getElementById('generated-invite').style.display = 'block';
    document.getElementById('copy-confirm').textContent = '';
    document.getElementById('invite-form').classList.remove('open');
    document.getElementById('inv-label').value = '';
    document.getElementById('inv-email').value = '';
    renderInvites();
    showToast('Invite created ✓', 'success');
  } catch (e) {
    showToast('Failed: ' + e.message, 'error');
  }
}

function copyGeneratedLink() {
  const link = document.getElementById('generated-link').textContent;
  navigator.clipboard.writeText(link).then(() => {
    document.getElementById('copy-confirm').textContent = '✓ Copied!';
    setTimeout(() => { document.getElementById('copy-confirm').textContent = ''; }, 2500);
  });
}

function copyInviteLink(link, btn) {
  navigator.clipboard.writeText(link).then(() => {
    const orig = btn.textContent; btn.textContent = '✓';
    setTimeout(() => { btn.textContent = orig; }, 1800);
  });
}

async function revokeInvite(id) {
  if (!confirm('Delete this invitation? Anyone with the link will no longer be able to sign up.')) return;
  try {
    await deleteRow('invitations', id);
    allInvites = allInvites.filter(i => i.id !== id);
    renderInvites();
    showToast('Invitation deleted');
  } catch (e) {
    showToast('Failed: ' + e.message, 'error');
  }
}

function escHtml(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show' + (type ? ' ' + type : '');
  setTimeout(() => { t.className = 'toast'; }, 3000);
}
</script>
</body>
</html>
