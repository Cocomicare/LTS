<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discharge Items Checklist</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');
:root { --bg:#F0F4F8; --surface:#FFFFFF; --border:#D0DCE8; --ink:#1A2533; --ink2:#4A5E72; --ink3:#8A9EAF; --accent:#3F9142; --radius:12px; }
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--ink); min-height:100vh; font-size:15px; }
header { background:var(--surface); border-bottom:1px solid var(--border); padding:18px 20px; }
.logo-title { font-family:'DM Serif Display',serif; font-size:19px; }
.logo-sub { font-size:11px; color:var(--ink3); text-transform:uppercase; letter-spacing:.5px; }
.page { padding:20px 16px 50px; max-width:640px; margin:0 auto; }
.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px 22px; margin-bottom:16px; }
.card h2 { font-family:'DM Serif Display',serif; font-size:17px; margin-bottom:10px; }
.card p { line-height:1.6; margin-bottom:8px; color:var(--ink2); }
.item-row { display:flex; align-items:flex-start; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); }
.item-row:last-child { border-bottom:none; }
.item-check { color:var(--accent); font-size:16px; margin-top:1px; }
.item-name { font-weight:600; font-size:14px; }
.item-detail { font-size:13px; color:var(--ink2); margin-top:2px; }
.sub-item { margin-left:26px; padding:6px 0; font-size:13.5px; color:var(--ink2); }
.link-box { background:#EEF3FA; border-radius:8px; padding:10px 12px; margin-top:4px; font-size:12.5px; color:var(--ink2); }
.empty { text-align:center; padding:60px 20px; color:var(--ink3); }
.source-note { font-size:11px; color:var(--ink3); text-align:center; margin-top:20px; }
</style>
</head>
<body>
<header>
  <a href="reference_hub.html" style="display:inline-block;font-size:13px;color:#3B82C4;text-decoration:none;font-weight:600;margin-bottom:6px">← Post Transplant References</a><br>
  <div class="logo-title">Discharge Items Checklist</div>
  <div class="logo-sub">Post Transplant References</div>
</header>
<div class="page" id="content"></div>

<script>
(async function init() {
  const user = await getCurrentUser();
  if (!user) {
    document.getElementById('content').innerHTML = '<div class="empty">🔒 Please log in via the PLTS Care dashboard to view this guide.</div>';
    return;
  }
  document.getElementById('content').innerHTML = `
    <div class="card">
      <h2>🛒 Items Needed Once You Are Discharged</h2>
      <div class="item-row"><span class="item-check">✓</span><div><div class="item-name">Blood pressure machine</div><div class="item-detail">For use on upper arm</div></div></div>
      <div class="item-row"><span class="item-check">✓</span><div><div class="item-name">Oral thermometer</div></div></div>
      <div class="item-row"><span class="item-check">✓</span><div><div class="item-name">Scale</div><div class="item-detail">Digital or analog</div></div></div>
      <div class="item-row"><span class="item-check">✓</span><div><div class="item-name">Pill box</div><div class="item-detail">With at least 3 slots/day</div></div></div>
      <div class="item-row"><span class="item-check">✓</span><div><div class="item-name">Extra strength Tylenol</div><div class="item-detail">500 mg</div></div></div>
      <div class="item-row"><span class="item-check">✓</span><div>
        <div class="item-name">Vitamins</div>
        <div class="sub-item">• Magnesium Oxide 400 mg</div>
        <div class="sub-item">• Calcium 600 mg</div>
        <div class="sub-item">• Vitamin D 400 IU (can purchase the combination Calcium + Vitamin D product)</div>
      </div></div>
    </div>

    <div class="card">
      <h2>🫁 Home Monitor for Spirometry/FEV1</h2>
      <p>Different from your incentive spirometer — for home use you only need to have FEV1 measured.</p>
      <div class="link-box">
        <strong>Microlife PF 100</strong> — can be purchased through Amazon or other sites<br><br>
        <strong>Smart One FEV1 meter</strong> — can be purchased through Amazon or other sites
      </div>
      <p style="margin-top:10px;font-size:13px">There are other meters available, but these are what the majority of transplant patients use. If you find another meter you like, let your coordinator know so they can offer it as an option to new patients.</p>
    </div>

    <div class="card">
      <h2>😷 Face Masks</h2>
      <p>A number of face masks are available for purchase, including paper face masks. The two below are examples some patients have purchased and been pleased with:</p>
      <div class="link-box">
        <strong>Cambridge Mask</strong> — cambridgemask.com or Amazon<br><br>
        <strong>Vogmask</strong> — www.vogmask.com or Amazon (discount code cannot be used on Amazon)<br>
        A respiratory filtering protective device. Use code <strong>KOONTZ</strong> for a $15 discount. If ordering more than one mask, place two separate orders to use the discount on each.
      </div>
    </div>

    <div class="source-note">Source: UF Health Lung Transplant Program — discharge instructions packet</div>
  `;
})();
</script>
</body>
</html>
