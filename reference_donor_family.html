@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');
:root { --bg:#F0F4F8; --surface:#FFFFFF; --border:#D0DCE8; --ink:#1A2533; --ink2:#4A5E72; --ink3:#8A9EAF; --accent:#7B5EA7; --accent-bg:#F0EAFA; --radius:12px; }

<script>
(async function init() {

    return;
  }
  document.getElementById('content').innerHTML = `
    <div class="card">
      <h2>Why Write to Your Donor Family</h2>
      <p>The death of a family member is one of the more difficult experiences anyone faces. Learning how a recipient's life has improved since getting transplanted can give some meaning to the senselessness surrounding a donor family's loss.</p>
      <p>There is no waiting period — you can write as soon as you are ready. Your letter may not be easy, and that's okay; LifeQuest has some suggestions for what to include below.</p>
    </div>

    <div class="card">
      <h2>What Information Is Off-Limits</h2>
      <p>To protect the privacy of both parties, the organ procurement organization (OPO) receives limited information about both the recipient and donor family, and that's the most information either side will have unless both choose to share more directly.</p>
      <p>Do <strong>not</strong> include any identifying information in your letter, including:</p>
      <ul>
        <li>Last names, city or state of residence</li>
        <li>Phone numbers</li>
        <li>Names of hospitals or doctors</li>
        <li>Websites or other social media contact information</li>
      </ul>
      <p>Your letter will be reviewed by the transplant coordinator and the OPO, and any identifying information will be removed before it's forwarded — so if something slips in, it'll be caught before it's sent.</p>
    </div>

    <div class="card">
      <h2>How to Address Your Letter</h2>
      <ul>
        <li>Address your correspondence to <strong>"Donor Family"</strong></li>
        <li>Identify yourself only by the organ(s) you received (e.g. "lung recipient")</li>
        <li>Write your name and transplant date on a <strong>separate sheet</strong> — this will not be sent, it's only used to identify the correct donor family</li>
        <li>Give that separate sheet, along with your letter, to your coordinator</li>
        <li>LifeQuest® mails the letter to maintain confidentiality</li>
      </ul>
      <h3>Closing your card or letter</h3>
      <ul>
        <li>Sign your first name only</li>
        <li>Do not reveal your address, city, phone number, the name of the transplant center, or your physician</li>
      </ul>
    </div>

    <div class="card">
      <h2>What to Include</h2>
      <h3>About yourself</h3>
      <ul>
        <li>Job or occupation</li>
        <li>Family situation (spouse, children, grandchildren, etc.) — use first names only</li>
        <li>Hobbies or interests</li>
        <li>Photos are okay if they don't contain identifying information</li>
        <li>The donor family's religion is unknown — consider this when making religious comments</li>
      </ul>
      <h3>About your transplant experience</h3>
      <ul>
        <li>Thank them for supporting organ donation and for their Gift of Life</li>
        <li>Open the letter with "Dear Donor Family" — express sympathy for the loss of their loved one</li>
        <li>Share your transplant experience — what the wait was like, how your life has changed since</li>
        <li>Explain the improvement and change the transplant brought to your life — what can you do now that you couldn't before?</li>
        <li>Explain what's happened in your life since transplant — a birthday? A wedding? Becoming a parent or grandparent? A new job or returning to school?</li>
      </ul>
    </div>

    <div class="card">
      <h2>How to Mail Your Letter</h2>
      <ul>
        <li>Place your letter in an unsealed envelope</li>
        <li>On a separate piece of paper, include your full name, organ received, and date of transplant</li>
        <li>Mail this to your transplant coordinator</li>
      </ul>
      <p>Your transplant coordinator will send your letter to your OPO, who will review and remove any identifying information before forwarding it to the donor's family. The process of exchanging these letters takes several weeks, so please be patient.</p>
    </div>

    <div class="card">
      <h2>Hearing From Your Donor Family</h2>
      <p>You may or may not hear back. Some donor families find writing about their loved one's gift helpful in their grieving process; others may be too overwhelmed to respond, or may simply not write back. Even if your donor's family doesn't write back, they may still appreciate receiving your letter and find solace in knowing that their loved one's gifts are benefitting others.</p>
      <div class="note-box">Remember, the donor's family may still be coping with their loss. While you may be celebrating the anniversary of your transplant, it's also the anniversary of someone else's loss. Please communicate with sensitivity.</div>
    </div>

    <div class="card">
      <h2>Will I Ever Communicate Directly or Meet Them?</h2>
      <p>Each OPO's policy on this differs. Usually, after several anonymous letters have been exchanged between the recipient and your donor's family, a year has passed since the donation, and a direct communication or meeting can be facilitated by the OPO and your transplant coordinator.</p>
      <p>The donor family and the recipient will both be asked to sign consent forms to release information, and the donor family will be given the recipient's contact information once both sides have consented.</p>
    </div>

    <div class="card">
      <h2>🌱 Other LifeQuest Opportunities</h2>
      <h3>Volunteering</h3>
      <p>Once you're feeling better and have recovered, you may want to get involved with events and activities that promote organ donation — LifeQuest's Ambassador program includes health fair tables, special events, presentations at churches/civic clubs, sharing your story, and office/project support. A comprehensive Ambassador training program runs throughout the year.</p>
      <h3>Donor Registry</h3>
      <p>If you're not ready to get involved publicly, you can still help from home — encourage others to join Florida's organ donor registry at <strong>www.DonateLifeFlorida.org</strong>, share the link on social media, or keep registry brochures on hand.</p>
    </div>

    <div class="card">
      <h2>Office Contact Information</h2>
      <h3>UF Health Lung Transplant Program</h3>
      <div class="contact-row"><span class="contact-label">Phone</span><span class="contact-val">352.265.8940</span></div>
      <div class="contact-row"><span class="contact-label">Fax</span><span class="contact-val">352.265.8970</span></div>
      <div class="contact-row"><span class="contact-label">Physical Address</span><span class="contact-val">1600 SW Archer Road<br>Gainesville, FL 32608</span></div>
      <div class="contact-row"><span class="contact-label">Mailing Address</span><span class="contact-val">PO Box 100223<br>Gainesville, FL 32610-0223</span></div>
      <div class="contact-row"><span class="contact-label">Website</span><span class="contact-val">UFHealth.org/transplant-center/lung</span></div>
      <p style="margin-top:10px">Office hours: 8:00 a.m.–4:30 p.m., Monday–Friday. You'll be transferred to the operator and on-call coordinator after hours and on weekends.</p>

      <h3 style="margin-top:18px">LifeQuest Organ Recovery Services</h3>
      <p style="font-size:13px;color:var(--ink2);margin-bottom:8px">Your local organ donor program, serving all of northern Florida. Based in Gainesville, with regional offices in Jacksonville, Tallahassee, and Pensacola.</p>
      <div class="contact-row"><span class="contact-label">Phone</span><span class="contact-val">352.733.0350</span></div>
      <div class="contact-row"><span class="contact-label">Email</span><span class="contact-val">PRDept@LifeQuest.ufl.edu</span></div>
      <div class="contact-row"><span class="contact-label">Website</span><span class="contact-val">www.LifeQuestFla.org</span></div>
    </div>

    <div class="source-note">Source: UF Health Shands Transplant Center — Lung Transplant Program Post-Transplant Guide for Patients; LifeQuest Organ Recovery Services — Writing to Donor Families brochure</div>
  `;
})();
</script>
