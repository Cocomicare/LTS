<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outpatient Follow-Up Schedule</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');
:root { --bg:#F0F4F8; --surface:#FFFFFF; --border:#D0DCE8; --ink:#1A2533; --ink2:#4A5E72; --ink3:#8A9EAF; --accent:#3B82C4; --warn:#E07B39; --warn-bg:#FDF0E8; --danger:#C94040; --danger-bg:#FAEAEA; --radius:12px; }
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--ink); min-height:100vh; font-size:15px; }
header { background:var(--surface); border-bottom:1px solid var(--border); padding:18px 20px; }
.logo-title { font-family:'DM Serif Display',serif; font-size:19px; }
.logo-sub { font-size:11px; color:var(--ink3); text-transform:uppercase; letter-spacing:.5px; }
.page { padding:20px 16px 50px; max-width:640px; margin:0 auto; }
.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px 22px; margin-bottom:16px; }
.card h2 { font-family:'DM Serif Display',serif; font-size:17px; margin-bottom:10px; }
.card p { line-height:1.6; margin-bottom:8px; color:var(--ink2); }
.card ul { margin:6px 0 6px 20px; line-height:1.7; color:var(--ink2); }
.card li { margin-bottom:4px; }
.warn-box { background:var(--warn-bg); border:1px solid #f0d8b8; border-radius:8px; padding:12px 14px; margin:10px 0; color:#9a5a1f; line-height:1.5; }
.danger-box { background:var(--danger-bg); border:1px solid #f0c0c0; border-radius:8px; padding:12px 14px; margin:10px 0; color:var(--danger); font-weight:600; line-height:1.5; }
.empty { text-align:center; padding:60px 20px; color:var(--ink3); }
.source-note { font-size:11px; color:var(--ink3); text-align:center; margin-top:20px; }
</style>
</head>
<body>
<header>
  <a href="reference_hub.html" style="display:inline-block;font-size:13px;color:#3B82C4;text-decoration:none;font-weight:600;margin-bottom:6px">← Reference Guide</a><br>
  <div class="logo-title">Outpatient Follow-Up Schedule</div>
  <div class="logo-sub">Post-Transplant Reference Guide</div>
</header>
<div class="page" id="content"></div>

<script>
(async function init() {
  const user = await getCurrentUser();
  if (!user) {
    document.getElementById('content').innerHTML = '<div class="empty">🔒 Please log in via the PLTS Care dashboard to view this guide.</div>';
    return;
  }
  document.getElementById('content').innerHTML = `
    <div class="card">
      <h2>📅 Clinic</h2>
      <p>Your in-person clinic will be scheduled either on Monday or Wednesday. Check MyChart for the specific date and time — <strong>clinic locations differ depending on the clinic day.</strong></p>
      <p>Prior to clinic you'll need a Chest X-ray. This will <strong>not</strong> appear on MyChart — it's walk-in only. You have standing chest X-ray orders at any Shands radiology location (North Tower, East Tower, Med Plaza, etc.).</p>
    </div>

    <div class="card">
      <h2>🫁 Spirometry</h2>
      <p>You'll also need pulmonary function tests (PFTs / spirometry) prior to clinic. These will be scheduled — check MyChart for the date and time.</p>
    </div>

    <div class="card">
      <h2>🧪 Labs</h2>
      <p>Labs are collected <strong>twice a week for the first several weeks post-transplant</strong> — Mondays and Thursdays, unless your coordinator instructs otherwise. Once your labs stabilize, frequency may decrease to once a week.</p>
      <div class="warn-box">
        <ul style="margin-left:18px">
          <li><strong>Do not</strong> take your morning dose of tacrolimus (Prograf) until after your labs have been collected</li>
          <li>Aim to have labs collected <strong>12 hours after</strong> your evening dose of medications (typically 7–9 a.m.)</li>
        </ul>
      </div>
    </div>

    <div class="card">
      <h2>🏋️ Physical Therapy</h2>
      <p>You'll be scheduled for physical therapy upon discharge. Check MyChart for the date and time. Expect PT <strong>3 days a week</strong>.</p>
    </div>

    <div class="card">
      <h2>💊 Medication Refills</h2>
      <p>Your medications are prescribed to the <strong>Shands South Tower Pharmacy</strong>. It is <strong>your responsibility</strong> to call the pharmacy and request a refill.</p>
      <p>Do not wait until you're out of medications before requesting a refill — these specialty meds are not always readily available.</p>
      <div class="danger-box">Never go without your meds! If you have any issues getting your medications filled, contact your coordinator.</div>
    </div>

    <div class="source-note">Source: UF Health Lung Transplant Program — patient instruction sheet</div>
  `;
})();
</script>
</body>
</html>
