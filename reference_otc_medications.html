<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');
:root { --bg:#F0F4F8; --surface:#FFFFFF; --border:#D0DCE8; --ink:#1A2533; --ink2:#4A5E72; --ink3:#8A9EAF; --accent:#A0357E; --good:#2D9E6B; --good-bg:#E8F7F1; --danger:#C94040; --danger-bg:#FAEAEA; --radius:12px; }
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--ink); min-height:100vh; font-size:15px; }
header { background:var(--surface); border-bottom:1px solid var(--border); padding:18px 20px; }
.logo-title { font-family:'DM Serif Display',serif; font-size:19px; }
.logo-sub { font-size:11px; color:var(--ink3); text-transform:uppercase; letter-spacing:.5px; }
.page { padding:20px 16px 50px; max-width:640px; margin:0 auto; }
.search-box { width:100%; padding:11px 14px; border:1.5px solid var(--border); border-radius:10px; font-size:15px; margin-bottom:16px; background:var(--surface); }
.search-box:focus { outline:none; border-color:var(--accent); }
.row-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px 18px; margin-bottom:10px; }
.problem { font-family:'DM Serif Display',serif; font-size:15px; color:var(--accent); margin-bottom:8px; }
.safe-block { background:var(--good-bg); border-radius:8px; padding:10px 12px; margin-bottom:8px; }
.safe-label { font-size:10px; font-weight:700; color:var(--good); text-transform:uppercase; letter-spacing:.4px; margin-bottom:3px; }
.generic { font-size:13px; color:var(--ink); margin-bottom:2px; }
.brands { font-size:12px; color:var(--ink2); }
.avoid-block { background:var(--danger-bg); border-radius:8px; padding:10px 12px; }
.avoid-label { font-size:10px; font-weight:700; color:var(--danger); text-transform:uppercase; letter-spacing:.4px; margin-bottom:3px; }
.avoid-text { font-size:12.5px; color:var(--ink2); line-height:1.5; }
.empty { text-align:center; padding:60px 20px; color:var(--ink3); }
.source-note { font-size:11px; color:var(--ink3); text-align:center; margin-top:20px; }
</style>
</head>

(async function init() {
  const user = await getCurrentUser();
  if (!user) {
    document.getElementById('content').innerHTML = '<div class="empty">đ Please log in via the LTS Care dashboard to view this guide.</div>';
    document.getElementById('search').style.display = 'none';

  renderRows(ROWS);
})();

function renderRows(rows) {
  document.getElementById('content').innerHTML = rows.map(r => `
    <div class="row-card">
      <div class="problem">${r.problem}</div>
      <div class="safe-block">
        <div class="safe-label">â Safe</div>
        <div class="generic">${r.safe}</div>
        <div class="brands">${r.brands}</div>

      ${r.avoid ? `<div class="avoid-block"><div class="avoid-label">â Avoid</div><div class="avoid-text">${r.avoid}</div></div>` : ''}
    </div>`).join('');
}

function filterRows() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = ROWS.filter(r => (r.problem + r.safe + r.brands + (r.avoid||'')).toLowerCase().includes(q));
  renderRows(filtered);
}
