<header>

<script>
(async function init() {
  const user = await getCurrentUser();
  if (!user) {
    document.getElementById('content').innerHTML = '<div class="empty">­¤öÆ Please log in via the PLTS Care dashboard to view this guide.</div>';
    return;
  }
  document.getElementById('content').innerHTML = `
    <div class="card">
      <h2>­¤ōō Keep a Binder</h2>
      <p>Use a three-ring binder notebook to track your home monitoring information. Bring this notebook to every clinic visit, every bronchoscopy visit, or if hospitalized.</p>
      <p>Purchase a bathroom scale, a blood pressure machine, and an oral thermometer. Home monitoring is done to look for infection, rejection, weight changes, and blood pressure changes.</p>
    </div>

    <div class="card">
      <h2>What to Record</h2>
      <h3>Every Morning</h3>
      <ul><li>Weight</li><li>Temperature*</li><li>Pulse</li><li>Blood pressure</li><li>Spirometry</li></ul>
      <h3>Every Evening</h3>
      <ul><li>Temperature*</li><li>Pulse</li><li>Blood pressure</li></ul>
      <div class="alert">* Call day, night, on weekends, or holidays for a temperature of 100.0┬░F or greater. This is an emergency.</div>
    </div>

    <div class="card">
      <h2>­¤½ü Daily Spirometry</h2>
      <p>Spirometry monitors your lung function ŌĆö comparable to the FEV1 score from your official pulmonary function test.</p>
      <ul>
        <li>Record the <strong>highest value out of 3 attempts</strong></li>
        <li>Bring your spirometer to every clinic visit, bronchoscopy visit, or hospitalization</li>
        <li>Do not perform the test more than 3 times in one day</li>
      </ul>
      <div class="warn-box">Call your coordinator if your spirometry readings are consistently (3 or more values) below the number set by your transplant team.</div>
    </div>

    <div class="card">
      <h2>Numbered Precautions</h2>
      <ol>
        <li>Avoid shopping in crowded places, especially during the first 6 months after transplant.</li>
        <li><strong>Wear a mask in public places</strong> ŌĆö hospitals, churches, movie theaters, shopping malls, etc. This is a lifelong precaution.</li>
        <li>Do not allow people with colds or fevers to visit you in your home without a mask; everyone should wash hands before contact with you.</li>
        <li>Do not eat from buffets or salad bars.</li>
        <li>Do not eat undercooked meats or raw seafood.</li>
        <li>Do not perform outdoor "chores" (mowing, planting, gardening) ŌĆö risk of mold/fungus/spore exposure that could harm your new lung(s).</li>
        <li>Do not add any new medications, including OTC drugs or herbal supplements, without first consulting your coordinator.</li>
        <li>Do not change your medication times without speaking to your coordinator ŌĆö some are timed according to drug levels.</li>
        <li>Do not allow your medications to run out ŌĆö many pharmacies need 48 hours to fill prescriptions; mail order can take 2ŌĆō3 weeks.</li>
      </ol>
    </div>

    <div class="card">
      <h2>­¤Ü½ OTC Medications to Avoid</h2>
      <p>Due to kidney toxicity, do not use:</p>
      <ul><li>Advil┬« / Motrin┬« / Aleve┬«</li><li>Ibuprofen products</li><li>Non-steroidal products (NSAIDs)</li></ul>
      <p>If you need pain medication, call your coordinator ŌĆö some medications interfere with how immunosuppressive drugs are absorbed.</p>
    </div>

    <div class="card">
      <h2>­¤ō× Important Reasons to Call Your Coordinator</h2>
      <ul>
        <li><strong>Temperature:</strong> 100.0┬░F or above</li>
        <li><strong>Blood pressure:</strong> Systolic &gt;160 or &lt;90; Diastolic &gt;100 or &lt;40 (recheck after 15ŌĆō30 min before calling)</li>
        <li><strong>Heart rate:</strong> Above 125 bpm at rest</li>
        <li><strong>FEV1 values:</strong> Trending down over 3 days in a row</li>
        <li><strong>Breathing:</strong> Shortness of breath that is different or new</li>
        <li><strong>Fatigue:</strong> A decrease in energy level</li>
        <li><strong>Sputum:</strong> Change in color or increase in amount</li>
        <li><strong>Vomiting or diarrhea:</strong> More than 3 watery stools/day ŌĆö call ASAP, this can change medication absorption and lead to rejection. Soft, pudding-like stools 1ŌĆō3├Ś/day is expected.</li>
      </ul>
    </div>

    <div class="source-note">Source: UF Health Shands Transplant Center ŌĆö Lung Transplant Program Post-Transplant Guide for Patients</div>
  `;
})();
</script>
